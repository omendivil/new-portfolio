name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type check — catches type errors ESLint misses
      - name: Type check
        run: npx tsc --noEmit

      # Lint — ESLint with eslint-config-next
      - name: Lint
        run: npm run lint

      # Convention tests — file structure + import boundaries
      - name: Convention tests
        run: npm run test:conventions

      # Dead code check — unused exports, orphaned files
      - name: Dead code check
        run: npx knip --reporter compact

      # Build — catches broken pages, invalid imports
      - name: Build
        run: npm run build

      # Security audit — flag known CVEs
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
